<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='t' x1='3' y1='21' x2='19' y2='5' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%238b8bf5' stop-opacity='0'/%3E%3Cstop offset='.5' stop-color='%238b8bf5' stop-opacity='.35'/%3E%3Cstop offset='1' stop-color='%238b8bf5' stop-opacity='.85'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M3 21L9 17L14 12L18 8' stroke='url(%23t)' stroke-width='1.5' stroke-linecap='round' fill='none'/%3E%3Cpath d='M17 9L19.5 5.5L21 6L19 9.5Z' fill='%238b8bf5' opacity='.7'/%3E%3Ccircle cx='20' cy='5.5' r='1.8' fill='%23fff' opacity='.85'/%3E%3C/svg%3E"/>
<title>Ascent - Career Launchpad</title>
<meta name="description" content="Curated roles at award-winning startups. Learn AI practically. Build a resume that gets past the filter."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f0f11;--surface:rgba(255,255,255,0.05);--surface-raised:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.10);--border-hover:rgba(255,255,255,0.18);--accent:#8b8bf5;--accent-soft:rgba(139,139,245,0.08);--accent-text:#a5a5f7;--text:rgba(255,255,255,0.92);--text-sec:rgba(255,255,255,0.68);--text-m:rgba(255,255,255,0.44);--green:#34d399;--green-soft:rgba(52,211,153,0.08);--serif:'Newsreader',Georgia,serif;--sans:'Instrument Sans',-apple-system,system-ui,sans-serif;--r:8px;--rl:12px;--ease:cubic-bezier(0.16,1,0.3,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.6}
::selection{background:var(--accent);color:#fff}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
input:focus{border-color:rgba(255,255,255,0.15)!important;outline:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}
@keyframes pageIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fyPulse{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glowPulse{0%,100%{opacity:.03}50%{opacity:.06}}
#root{animation:pageIn 1.8s cubic-bezier(0.4,0,0.2,1) both}
.fu{animation:fadeUp 1s cubic-bezier(0.4,0,0.2,1) both}.fi{animation:fadeIn .8s cubic-bezier(0.4,0,0.2,1) both}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}.d5{animation-delay:.4s}.d6{animation-delay:.48s}

/* Ambient glow behind masthead */
body::before{content:"";position:fixed;top:-220px;left:50%;transform:translateX(-50%);width:900px;height:650px;background:radial-gradient(ellipse,rgba(139,139,245,0.035) 0%,transparent 65%);pointer-events:none;z-index:0;animation:glowPulse 10s ease-in-out infinite}

/* Header */
.hdr{background:rgba(9,9,11,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.hdr-in{max-width:1200px;margin:0 auto;padding:14px 36px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;position:relative}
.logo-m{width:28px;height:28px}
.logo-shine{position:relative;display:inline-flex}
.logo-shine::after{content:"";position:absolute;inset:-2px;background:linear-gradient(120deg,transparent 30%,rgba(139,139,245,0.25) 50%,transparent 70%);background-size:200% 100%;border-radius:4px;animation:shimmer 2s cubic-bezier(0.4,0,0.2,1) 0.5s 1 both;pointer-events:none;opacity:0}
@keyframes shimmer{0%{opacity:1;background-position:200% 0}100%{opacity:0;background-position:-200% 0}}
.logo-t{font:500 14px/1 var(--sans);color:var(--text);letter-spacing:.12em;text-transform:uppercase}
.hdr-meta{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text-m)}
.hdr-meta b{color:var(--text-sec);font-weight:500}

/* Tabs */
.tabs{border-bottom:1px solid var(--border);background:rgba(9,9,11,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:51px;z-index:99}
.tabs-in{max-width:1200px;margin:0 auto;padding:0 36px;display:flex;gap:0}
.tab{padding:13px 20px;font:500 14px/1 var(--sans);color:var(--text-m);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:color .25s var(--ease),border-color .25s var(--ease);letter-spacing:.01em}
.tab-sep{width:1px;background:var(--border);margin:8px 8px;align-self:stretch;opacity:.5}
.tab:hover{color:var(--text-sec)}
.tab.on{color:var(--text);border-bottom-color:var(--accent)}
.new-pill{font-size:10px;font-weight:500;letter-spacing:0.04em;padding:2px 6px;border-radius:100px;line-height:1;background:rgba(52,211,153,0.12);color:rgba(52,211,153,0.85);margin-left:6px;vertical-align:middle;text-transform:lowercase}

.mn{max-width:1200px;margin:0 auto;padding:0 36px 120px;position:relative;z-index:1}

/* Masthead */
.mh{padding:40px 0 0;margin-bottom:20px}
.mh-ey{font:500 11px/1 var(--sans);color:var(--accent);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
.mh h1{max-width:660px}
.mh-sub{font-size:16px;color:var(--text-sec);margin-top:10px;line-height:1.55;max-width:520px}
.mh-sub b{color:var(--text);font-weight:500}
.mh-date{font:400 13px/1 var(--sans);color:var(--text-m);margin-top:8px;opacity:.5}
.mh-date span{display:inline-block;animation:dateFade .8s ease both}
@keyframes dateFade{from{opacity:0}to{opacity:1}}
.mh-rotate{display:inline-block;transition:opacity .5s var(--ease),transform .5s var(--ease);color:var(--accent)}
.mh-dash{color:var(--accent);margin:0 6px}
.mh h1{max-width:660px;position:relative}
.mh-rotate-wrap{display:inline-block;position:relative;vertical-align:baseline;min-width:220px}
.mh-rotate-text{position:absolute;left:0;top:0;white-space:nowrap;animation:heroFade 3s ease-in-out infinite}
@keyframes heroFade{0%{opacity:0;transform:translateY(4px)}8%{opacity:1;transform:translateY(0)}85%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-4px)}}

/* Compact filter bar */
.dir-filterbar{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl)}
.dir-fb-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.dir-fb-pills{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.dir-fb-div{width:1px;height:18px;background:var(--border);margin:0 4px}
.dir-fb-label{font:600 11px/1 var(--sans);color:var(--text-sec);text-transform:uppercase;letter-spacing:.08em;margin-right:4px}
.dir-fb-sep{width:1px;height:20px;background:var(--border);margin:0 6px}
.dir-fb-pill{padding:5px 11px;font:500 13px/1 var(--sans);background:transparent;color:var(--text-sec);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s var(--ease);white-space:nowrap}
.dir-fb-pill:hover{background:rgba(255,255,255,0.06);color:var(--text);border-color:var(--border-hover)}
.dir-fb-pill.on{background:rgba(139,139,245,0.12);color:var(--accent);border-color:rgba(139,139,245,0.25)}
.dir-fb-pill.green{background:rgba(52,211,153,0.1);color:var(--green);border-color:rgba(52,211,153,0.25)}
.dir-fb-clear{font:500 11px/1 var(--sans);color:var(--accent);cursor:pointer;margin-left:auto;opacity:.8;transition:opacity .2s;padding:5px 8px}.dir-fb-clear:hover{opacity:1}
.dir-fb-label.off{color:var(--text-m);opacity:.5}
.dir-fb-muted{font:400 12px/1 var(--sans);color:var(--text-m);font-style:italic}
.dir-loc-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;font:500 11px/1 var(--sans);background:rgba(139,139,245,0.12);color:var(--accent-text);border-radius:4px;border:1px solid rgba(139,139,245,0.25);cursor:pointer;transition:opacity .15s}.dir-loc-chip:hover{opacity:.7}
.dir-loc-dd-wrap{position:relative}
.dir-loc-trigger{display:inline-flex;align-items:center;gap:4px}
.dir-loc-caret{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid currentColor;margin-left:2px}
.dir-loc-panel{position:absolute;top:calc(100% + 6px);left:0;width:260px;background:var(--bg);border:1px solid var(--border-hover);border-radius:10px;padding:6px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.dir-loc-search{width:100%;padding:7px 10px;font:400 12px/1 var(--sans);background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;margin-bottom:4px}.dir-loc-search:focus{border-color:var(--border-hover)}
.dir-loc-list{max-height:240px;overflow-y:auto;scrollbar-width:thin}
.dir-loc-grp{font:600 10px/1 var(--sans);color:var(--text-m);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px 4px}
.dir-loc-item{padding:5px 10px;font:400 12px/1.3 var(--sans);color:var(--text-sec);border-radius:5px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s}.dir-loc-item:hover{background:var(--surface)}
.dir-loc-item.on{color:var(--accent-text)}
.dir-loc-check{width:14px;height:14px;border-radius:3px;border:1px solid var(--border-hover);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.dir-loc-check.on{background:rgba(139,139,245,0.2);border-color:rgba(139,139,245,0.4)}
.dir-loc-check.on::after{content:"";width:6px;height:6px;background:var(--accent);border-radius:1px}

/* Search */
.sr{display:flex;gap:12px;margin-bottom:24px;align-items:stretch}
.sb{flex:1;display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:all .25s var(--ease)}
.sb:focus-within{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.04)}
.sb svg{flex-shrink:0;opacity:.25}
.si{flex:1;border:none;background:transparent;font:400 16px var(--sans);color:var(--text);outline:none}
.si::placeholder{color:var(--text-sec)}

/* Buttons */
.btn{padding:10px 20px;font:500 14px/1 var(--sans);border:none;border-radius:var(--r);cursor:pointer;transition:all .25s var(--ease);white-space:nowrap}
.bp{background:var(--accent);color:#fff}.bp:hover{background:#9d9df7}.bp:disabled{opacity:.35;cursor:default}
.bs{background:var(--surface);color:var(--text-sec);border:1px solid var(--border)}.bs:hover{border-color:var(--border-hover);color:var(--text)}
.bg{background:transparent;color:var(--text-m);padding:8px 12px;font-size:12px;cursor:pointer;border:none;transition:color .2s}.bg:hover{color:var(--text-sec)}

/* Award bar (unused in sidebar layout but kept for compat) */
.ab{margin-bottom:24px;padding-bottom:16px}
.ab-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:10px}
.ab-row:last-child{margin-bottom:0}
.ab-lb{font:500 11px/1 var(--sans);color:var(--text-m);text-transform:uppercase;letter-spacing:.08em;margin-right:6px;position:relative;cursor:help;display:inline-flex;align-items:center;gap:5px}
.ab-lb .ti{width:15px;height:15px;border-radius:50%;border:1px solid var(--border-hover);display:inline-flex;align-items:center;justify-content:center;font:500 10px/1 var(--sans);color:var(--text-m);flex-shrink:0}
.ab-lb:hover .tip{opacity:1;transform:translateY(0);pointer-events:auto}
.tip{position:absolute;left:0;top:calc(100% + 10px);width:280px;padding:14px 16px;background:#1a1a1f;border:1px solid rgba(255,255,255,0.08);border-radius:10px;font:400 14px/1.55 var(--sans);color:var(--text-sec);opacity:0;transform:translateY(-4px);transition:all .2s var(--ease);pointer-events:none;z-index:50;text-transform:none;letter-spacing:0;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.aw-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;font:500 13px/1 var(--sans);border-radius:100px;cursor:pointer;transition:all .2s var(--ease);border:1px solid}
.aw-btn .aw-i{font-size:10px}.aw-btn .aw-c{font-size:11px;opacity:.5;margin-left:2px}

/* Filters */
.fr{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:18px}
.ft{display:flex;align-items:center;gap:6px;padding:8px 14px;font:500 14px/1 var(--sans);background:transparent;color:var(--text-sec);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .25s var(--ease)}
.ft:hover{border-color:var(--border-hover);color:var(--text)}.ft.on{background:rgba(139,139,245,0.1);color:var(--accent);border-color:rgba(139,139,245,0.2)}
.fb{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:600}
.fp{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--rl);padding:22px;margin-bottom:22px;display:grid;gap:18px;animation:fadeIn .3s var(--ease)}
.fgt{font:500 11px/1 var(--sans);color:var(--text-m);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}
.cps{display:flex;flex-wrap:wrap;gap:5px}
.cp{padding:6px 12px;font:400 13px/1 var(--sans);background:transparent;color:var(--text-sec);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .2s var(--ease)}
.cp:hover{border-color:var(--border-hover);color:var(--text)}.cp.on{background:rgba(139,139,245,0.1);color:var(--accent);border-color:rgba(139,139,245,0.2);font-weight:500}
.cc{font-size:11px;opacity:.4;margin-left:3px}

/* Sidebar layout */
.job-layout{display:grid;grid-template-columns:220px 1fr;gap:32px;align-items:start;height:calc(100vh - 160px)}
.sidebar{position:sticky;top:0;max-height:calc(100vh - 160px);overflow-y:auto;overflow-x:hidden;padding-right:8px}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
.job-right{max-height:calc(100vh - 160px);overflow-y:auto;overflow-x:hidden;padding-right:4px}
.job-right::-webkit-scrollbar{width:3px}.job-right::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
.sidebar-sec{margin-bottom:24px}
.sidebar-title{font:500 11px/1 var(--sans);color:var(--text-m);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sidebar-clear{font:400 11px/1 var(--sans);color:var(--accent);cursor:pointer;text-transform:none;letter-spacing:0;opacity:.7;transition:opacity .2s}.sidebar-clear:hover{opacity:1}
.sb-chips{display:flex;flex-direction:column;gap:1px}
.sb-chip{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;font:400 14px/1 var(--sans);color:var(--text-sec);border-radius:6px;cursor:pointer;transition:all .2s var(--ease);background:transparent}
.sb-chip:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.sb-chip.on{background:rgba(139,139,245,0.08);color:var(--accent)}
.sb-chip .sb-cnt{font:400 11px/1 var(--sans);color:var(--text-m)}
.sb-aw{display:flex;align-items:center;gap:6px;padding:6px 10px;font:400 13px/1 var(--sans);border-radius:6px;cursor:pointer;transition:all .2s var(--ease);border:1px solid transparent}
.sb-aw:hover{background:rgba(255,255,255,0.04)}
.sb-aw.on{background:rgba(139,139,245,0.06);border-color:rgba(139,139,245,0.15)}
.sb-aw .aw-i{font-size:10px}
.sb-aw-grp{margin-bottom:16px}
.sb-aw-grp-lb{font:500 11px/1 var(--sans);color:var(--text-m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:flex;align-items:center;gap:4px;cursor:help;position:relative}
.sb-aw-grp-lb:hover .tip{opacity:1;transform:translateY(0);pointer-events:auto}

/* Results */
.rh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}
.rc{font:400 14px var(--sans);color:var(--text-m)}.rc b{color:var(--text-sec);font-weight:500}

/* Job grid */
.gd{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.cd{background:rgba(255,255,255,0.025);border:1px solid transparent;border-radius:var(--rl);padding:20px;cursor:pointer;transition:all .3s var(--ease);display:flex;flex-direction:column;justify-content:space-between;min-height:175px}
.cd:hover{background:rgba(255,255,255,0.045);border-color:var(--border);transform:translateY(-1px)}
.cc-r{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cc-lg{width:32px;height:32px;border-radius:7px;object-fit:contain;background:rgba(255,255,255,0.06);flex-shrink:0}
.cc-em{font-size:22px;line-height:1;width:32px;text-align:center;flex-shrink:0}
.cc-inf{flex:1;min-width:0}
.cc-nm{font:500 15px/1.2 var(--sans);color:var(--text);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-sec{font:400 13px/1 var(--sans);color:var(--text-m)}
.cd-aw{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.cd-ab{display:inline-flex;align-items:center;padding:3px 8px;font:500 10px/1 var(--sans);border-radius:100px;white-space:nowrap;letter-spacing:.02em}
.cd-t{font:400 18px/1.3 var(--serif);color:var(--text);letter-spacing:-.01em}
.cd-m{margin-top:auto;padding-top:14px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.mt{font:400 11px/1 var(--sans);padding:3px 9px;border-radius:5px;background:rgba(255,255,255,0.04);color:var(--text-m)}
.mt.rm{background:var(--green-soft);color:var(--green)}
.cd-loc{font:400 11px/1 var(--sans);color:var(--text-m);margin-left:auto}

/* Pagination */
.currentPage{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:40px;padding-top:24px;border-top:1px solid var(--border)}
.pgb{padding:8px 18px;font:500 14px/1 var(--sans);background:transparent;color:var(--text-sec);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s var(--ease)}
.pgb:hover:not(:disabled){border-color:var(--border-hover);color:var(--text)}
.pgb:disabled{opacity:.25;cursor:default}
.pgi{font:400 14px/1 var(--sans);color:var(--text-m)}

/* Progress */
.pw{margin-top:14px}.pb{height:2px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;margin-bottom:8px}
.pf{height:100%;background:var(--accent);border-radius:2px;transition:width .5s var(--ease)}
.pt{font:400 12px/1 var(--sans);color:var(--text-m)}

/* AI panel */
.ap{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--rl);padding:22px;margin-bottom:20px}
.ai-in{flex:1;padding:11px 15px;font:400 15px var(--sans);background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--r);color:var(--text);outline:none;transition:all .2s}
.ai-in:focus{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12)}
.ah{font:400 12px/1.5 var(--sans);color:var(--text-m);margin-top:8px}
.as{background:rgba(255,255,255,0.02);border-radius:var(--r);padding:16px;margin-bottom:12px;margin-top:14px}
.ast{font:500 11px/1 var(--sans);color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.amr{display:flex;gap:10px;margin-bottom:10px}
.ark{font:600 12px/1 var(--sans);color:var(--accent);flex-shrink:0;padding-top:2px}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;animation:fadeIn .15s}
.ml{background:#141416;border-radius:14px;max-width:660px;width:100%;max-height:82vh;overflow-y:auto;position:relative;border:1px solid rgba(255,255,255,0.06);animation:fadeUp .35s var(--ease)}
.mx{position:absolute;top:16px;right:16px;width:30px;height:30px;border:none;background:rgba(255,255,255,0.06);color:var(--text-m);border-radius:7px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mx:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.mhd{padding:28px 28px 18px;border-bottom:1px solid var(--border)}
.mtt{font:400 24px/1.25 var(--serif);color:var(--text);letter-spacing:-.01em;margin-top:6px}
.mbd{padding:22px 28px 28px}
.mds{font:400 15px/1.85 var(--sans);color:var(--text-sec);white-space:pre-wrap;margin-bottom:24px}
.apl{display:inline-block;padding:12px 28px;font:500 15px/1 var(--sans);background:var(--accent);color:#fff;border-radius:var(--r);text-decoration:none;transition:all .25s var(--ease)}
.apl:hover{background:#9d9df7;transform:translateY(-1px)}

/* Content sections (AI Learning, Resume Tips) */
.ct{max-width:700px}
.ct-sec{margin-bottom:48px}
.ct-badge{display:inline-block;font:500 11px/1 var(--sans);color:var(--accent);text-transform:uppercase;letter-spacing:.12em;padding:5px 12px;background:var(--accent-soft);border-radius:100px;margin-bottom:16px}
.ct h2{font:400 30px/1.2 var(--serif);color:var(--text);margin-bottom:14px;letter-spacing:-.02em}
.ct h3{font:500 18px/1.3 var(--serif);color:var(--text);margin:28px 0 12px}
.ct p{font:400 16px/1.8 var(--sans);color:var(--text-sec);margin-bottom:16px}
.ct ul{margin:0 0 20px 0;padding-left:20px}
.ct li{font:400 15px/1.8 var(--sans);color:var(--text-sec);margin-bottom:8px}
.ct li b{color:var(--text);font-weight:500}
.ct-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:12px;transition:background .2s}
.ct-card:hover{background:rgba(255,255,255,0.04)}
.ct-card-title{font:500 16px/1.2 var(--sans);color:var(--text);margin-bottom:8px}
.ct-card-sub{font:400 15px/1.65 var(--sans);color:var(--text-sec)}
.ct-code{font:400 13px/1.75 var(--sans);color:var(--text-sec);background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin:12px 0 20px;white-space:pre-wrap}
.ct-step{display:flex;gap:16px;margin-bottom:22px}
.ct-step-num{width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font:500 13px/30px var(--sans);text-align:center;flex-shrink:0}
.ct-step-body{flex:1}
.ct-divider{height:1px;background:var(--border);margin:36px 0}

/* Companies Directory */
.dir-search{display:flex;gap:12px;margin-bottom:12px;align-items:stretch}
.dir-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.dir-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.dir-card{background:rgba(255,255,255,0.025);border:1px solid transparent;border-radius:var(--rl);padding:18px;transition:background .25s var(--ease),border-color .25s var(--ease);cursor:pointer}
.dir-card:hover{background:rgba(255,255,255,0.045);border-color:var(--border)}
.dir-card.selected{background:rgba(139,139,245,0.06);border-color:rgba(139,139,245,0.2)}
.dir-detail{grid-column:1/-1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--rl);padding:24px;animation:fadeUp .3s var(--ease)}
.dir-detail-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.dir-detail-close{width:28px;height:28px;border:none;background:rgba(255,255,255,0.06);color:var(--text-m);border-radius:7px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-left:auto;flex-shrink:0}
.dir-detail-close:hover{background:rgba(255,255,255,0.1);color:var(--text)}
.dir-expand{display:none}
.dir-desc{font:400 14px/1.65 var(--sans);color:var(--text-sec);margin-bottom:14px;max-width:640px}
.dir-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.dir-hiring{margin-top:14px;padding:12px 16px;background:rgba(139,139,245,0.04);border:1px solid rgba(139,139,245,0.12);border-radius:10px}
.dir-hiring-title{font:500 12px/1 var(--sans);color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.dir-hiring-links{display:flex;gap:8px;flex-wrap:wrap}
.dir-hiring-link{font:400 13px/1 var(--sans);color:var(--text-sec);background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;padding:7px 12px;text-decoration:none;transition:all .2s var(--ease);display:inline-flex;align-items:center;gap:5px}
.dir-hiring-link:hover{background:rgba(139,139,245,0.08);border-color:rgba(139,139,245,0.3);color:var(--text)}

/* Inline job list inside expanded company card */
.dir-jobs{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.dir-jobs-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dir-jobs-title{font:500 12px/1 var(--sans);color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
.dir-jobs-count{font:400 12px/1 var(--sans);color:var(--text-m)}
.dir-job{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border-radius:8px;transition:background .2s var(--ease);cursor:default}
.dir-job:hover{background:rgba(255,255,255,0.04)}
.dir-job-info{flex:1;min-width:0}
.dir-job-title{font:600 13px/1.3 var(--sans);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dir-job-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap}
.dir-job-tag{font:500 11px/1 var(--sans);padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--text-sec)}
.dir-job-tag.remote{background:var(--green-soft);color:var(--green)}
.dir-job-sal{font:600 12px/1 var(--sans);color:var(--green)}
.dir-job-apply{font:500 11px/1 var(--sans);color:var(--accent);text-decoration:none;white-space:nowrap;padding:5px 12px;border-radius:6px;border:1px solid rgba(139,139,245,0.2);transition:all .2s var(--ease);flex-shrink:0}
.dir-job-apply:hover{background:rgba(139,139,245,0.08);border-color:rgba(139,139,245,0.4)}
.dir-jobs-loading{display:flex;align-items:center;gap:8px;padding:12px 0}
.dir-jobs-loading-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dotPulse 1.2s ease-in-out infinite}
.dir-jobs-loading-dot:nth-child(2){animation-delay:.2s}
.dir-jobs-loading-dot:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.dir-card-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dir-card-logo{width:36px;height:36px;border-radius:8px;object-fit:contain;background:rgba(255,255,255,0.06);flex-shrink:0}
.dir-card-emoji{font-size:26px;width:36px;text-align:center;flex-shrink:0}
.dir-card-name{font:600 15px/1.2 var(--sans);color:var(--text);letter-spacing:-0.01em}
.dir-card-sector{font:400 12px/1 var(--sans);color:var(--text-sec);margin-top:3px}
.dir-card-hq{font:400 12px/1 var(--sans);color:var(--text-sec);margin-top:8px}
.dir-card-awards{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.dir-card-src{font:400 11px/1 var(--sans);color:var(--text-m);margin-top:8px}
.dir-count{font:400 14px var(--sans);color:var(--text-sec);margin-bottom:16px}.dir-count b{color:var(--text);font-weight:600}

/* Empty */
.emp{text-align:center;padding:64px 24px}.emp p{font:400 16px/1.5 var(--serif);color:var(--text-m);margin-bottom:16px}

/* Skeleton loading cards */
@keyframes shimmerLoad{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.skel-card{background:rgba(255,255,255,0.025);border-radius:var(--rl);padding:20px;min-height:175px}
.skel-bar{height:12px;border-radius:4px;background:linear-gradient(90deg,rgba(255,255,255,0.03) 0%,rgba(255,255,255,0.06) 50%,rgba(255,255,255,0.03) 100%);background-size:400px 100%;animation:shimmerLoad 1.5s infinite linear;margin-bottom:10px}
.skel-bar.w60{width:60%}.skel-bar.w80{width:80%}.skel-bar.w40{width:40%}

/* Body scroll lock when modal is open */
body.modal-open{overflow:hidden}

@media(max-width:900px){.job-layout{grid-template-columns:1fr;height:auto}.sidebar{position:static;max-height:none;overflow:visible;display:flex;flex-wrap:wrap;gap:8px;padding-right:0}.job-right{max-height:none;overflow:visible;padding-right:0}.sidebar-sec{margin-bottom:8px}.sb-chips{flex-direction:row;flex-wrap:wrap}.sb-aw-grp{margin-bottom:8px}}
@media(max-width:720px){.hdr-in{padding:12px 20px}.mn{padding:0 20px 80px}.gd{grid-template-columns:1fr}.hdr-meta{display:none}.mh h1{font-size:26px}.mh{padding:36px 0 24px}.tabs-in{padding:0 20px}.tab{padding:12px 16px;font-size:12px}.ct{max-width:100%}.ct h2{font-size:24px}}

/* FilterBar (preview) — Phase 1 */
.fbar{position:sticky;top:0;z-index:90;background:var(--bg);padding:14px 0 10px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.fbar-inner{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fbar-btn-wrap{position:relative}
.fbar-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font:500 13px/1 var(--sans);background:transparent;color:var(--text-sec);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s var(--ease);white-space:nowrap}
.fbar-btn:hover{border-color:var(--border-hover);color:var(--text)}
.fbar-btn.on{background:rgba(139,139,245,0.10);color:var(--accent);border-color:rgba(139,139,245,0.22)}
.fbar-btn-cnt{display:inline-flex;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;border-radius:9px;background:var(--accent);color:#fff;font:600 10px/1 var(--sans)}
.fbar-caret{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid currentColor;margin-left:1px;opacity:.6}
.fbar-results{font:400 14px var(--sans);color:var(--text-m);margin-left:auto;margin-right:0}
.fbar-results b{color:var(--text-sec);font-weight:500}
.fbar-clear{font:400 12px/1 var(--sans);color:var(--accent);background:transparent;border:none;cursor:pointer;padding:6px 8px;opacity:.75;transition:opacity .2s}
.fbar-clear:hover{opacity:1}
.fbar-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.fbar-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;font:500 11px/1 var(--sans);background:rgba(139,139,245,0.10);color:var(--accent-text);border:1px solid rgba(139,139,245,0.20);border-radius:4px;cursor:pointer;transition:opacity .15s;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fbar-chip:hover{opacity:.7}
.fbar-chip-x{opacity:.55;font-size:12px;line-height:1}
.fbar-pop{position:absolute;top:calc(100% + 6px);left:0;min-width:260px;max-width:340px;background:var(--bg);border:1px solid var(--border-hover);border-radius:10px;padding:6px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.fbar-pop-search{width:100%;padding:7px 10px;font:400 12px/1 var(--sans);background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);outline:none;margin-bottom:4px;box-sizing:border-box}
.fbar-pop-search:focus{border-color:var(--border-hover)}
.fbar-pop-list{max-height:320px;overflow-y:auto;scrollbar-width:thin}
.fbar-pop-list::-webkit-scrollbar{width:3px}.fbar-pop-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
.fbar-pop-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 10px;font:400 13px/1.3 var(--sans);color:var(--text-sec);border-radius:5px;cursor:pointer;transition:background .1s}
.fbar-pop-item:hover{background:var(--surface)}
.fbar-pop-item.on{color:var(--accent-text);background:rgba(139,139,245,0.08)}
.fbar-pop-item.disabled{opacity:.35;cursor:not-allowed}
.fbar-pop-item.disabled:hover{background:transparent}
.fbar-pop-item-cnt{font:400 11px/1 var(--sans);color:var(--text-m);flex-shrink:0}
@media(max-width:720px){.fbar{padding:10px 0 8px}.fbar-btn{padding:6px 10px;font-size:12px}.fbar-results{width:100%;order:10;margin-left:0;margin-top:4px}.fbar-pop{min-width:220px;max-width:calc(100vw - 40px)}}
</style>

function classifyJobFunction(t){t=(t||"").toLowerCase();
// Check compound titles first (order matters — longer matches before shorter)
if(/customer\s*success|client\s*success|success\s*manager|success\s*assoc|success\s*lead|success\s*director|customer\s*experience|cx\s*manager|cx\s*lead|support\s*engineer|support\s*manager|support\s*special|help\s*desk|technical\s*support|onboard|professional\s*service|deploy|activation|enablement|implementation\s*(manager|lead|consult|spec|direct|eng)|customer\s*onboard|engagement\s*manager/.test(t))return"Customer Success";
if(/product\s*manager|product\s*lead|product\s*owner|product\s*director|product\s*analyst|product\s*strat|product\s*design/.test(t))return"Product";
if(/account\s*exec|business\s*develop|sdr\b|bdr\b|sales\s|sales$|partnerships|partner\s*manager|alliances|channel\s*manager|enterprise\s*rep|solutions?\s*consult|solutions?\s*engineer|solutions?\s*architect|pre\s*sales|demo\s*eng|quota/.test(t))return"Sales";
// Bare "consultant" after Sales has claimed solutions consultant
if(/\bconsultant\b/.test(t))return"Customer Success";
if(/data\s*scien|machine\s*learn|ml\s*eng|ai\s*eng|nlp|deep\s*learn|computer\s*vision|data\s*analy|analytics\s*eng|business\s*intel|bi\s*analy|quant\b|statistic/.test(t))return"Data Science";
if(/engineer|developer|software|frontend|backend|fullstack|full\s*stack|mobile\s*dev|ios\s*dev|android\s*dev|sre\b|programmer|coder|embedded|firmware|platform\s*eng|site\s*reliability/.test(t))return"Engineering";
if(/design|ux|ui\s|creative\s*dir|brand\s*design|graphic|visual\s*design|illustrat/.test(t))return"Design";
if(/marketing|growth\s*market|content\s*market|seo|sem\b|paid\s*media|demand\s*gen|comms\b|communications\s*manager|public\s*relation|social\s*media|copywrite|editor/.test(t))return"Marketing";
if(/financ|account(?:ing|ant)|controller|treasury|tax\b|audit|bookkeep|payroll|billing\s*manager|collections|accounts\s*(pay|rec)|fp.?a\b|cfo\b/.test(t))return"Finance";
if(/operations|ops\b|supply\s*chain|logistics|procurement|warehouse|fleet|fulfillment|program\s*manage|project\s*manage|scrum|agile\s*coach|delivery\s*manager/.test(t))return"Operations";
if(/recruit|people\s*ops|human\s*resource|talent|hr\b|benefits\s*manager|compensation|dei\b|diversity|learning\s*.?\s*develop|l.?d\b|hrbp/.test(t))return"HR & People";
