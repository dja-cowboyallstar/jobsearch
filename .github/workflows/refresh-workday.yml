name: Refresh Workday Jobs
on:
  schedule:
    # Runs every day at 2:00 AM UTC (4 hours before main refresh at 6:00 AM UTC).
    # The main refresh (refresh-jobs.yml) merges the output blob into jobs-data.json.
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @vercel/blob
      - name: Diagnostic - verify code version
        run: |
          echo "=== DIAGNOSTIC ==="
          echo "Git SHA: $(git rev-parse HEAD)"
          echo "refresh-workday.js lines: $(wc -l < scripts/refresh-workday.js)"
          echo "fetchWorkdayListPage count: $(grep -c fetchWorkdayListPage scripts/refresh-workday.js)"
          echo "fetchWorkdayDetail count:  $(grep -c fetchWorkdayDetail scripts/refresh-workday.js)"
          echo "parseQualifications count: $(grep -c parseQualifications scripts/refresh-workday.js)"
          echo "=== END DIAGNOSTIC ==="
      - name: Fetch and upload Workday job data
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
        run: node scripts/refresh-workday.js
